# Top-level tuned config for top_tier_adaptive.
# Shipped tuned runtime preset for this strategy.
# Put SCHWAB_APP_KEY, SCHWAB_APP_SECRET, SCHWAB_ACCOUNT_HASH, SCHWAB_ENCRYPTION_KEY, and TRADINGVIEW_SESSIONID in a .env file at the repo root (see .env.example).

# Active strategy preset to run.
strategy: top_tier_adaptive

# Schwab API credentials, token storage, and account selection.
schwab:
  callback_url: https://127.0.0.1
  tokens_db: .schwabdev/tokens.db
  timeout: 10
  dry_run: true
  # Forwards to schwabdev.Client(open_browser_for_auth=...). When true (default),
  # the OAuth flow auto-opens a browser tab. Set false on headless deployments
  # (servers, CI, containers) — schwabdev will log the auth URL to open manually.
  open_browser_for_auth: true

# TradingView and screener inputs used to source candidates.
tradingview:
  market: america
  max_candidates: 10
  screener_refresh_seconds: 60
  min_market_cap: 30000000
  max_market_cap: 2000000000
  min_volume: 550000
  min_value_traded_1m: 100000.0
  min_volume_1m: 8000

# Paper-account starting state and retained history settings.
paper:
  starting_equity: 50000.0
  max_equity_points: 2000
  max_trade_history: 200

# Position sizing, exposure caps, and trade-management defaults.
risk:
  max_positions: 4
  risk_per_trade_frac_of_notional: 0.008
  max_notional_per_trade: 16000.0
  max_total_notional: 68000.0
  max_daily_loss: 500.0
  # Stop floor / target ceiling. ``default_stop_pct`` is the percentage
  # backstop applied when the regime's structural stop (ATR-buffered
  # swing-low) would be tighter than this. Tightened from 0.014 (1.4%)
  # to 0.010 (1.0%) on 2026-05-14 after AMD whipsaw analysis showed the
  # 1.4% floor produced $8+ cushion on $445 tape, far wider than needed
  # to absorb routine post-open intra-bar wicks (~0.3-0.5%).
  # Post-widen during early session (10:05-10:30): 1.0% × 1.3 = 1.3% —
  # ~$5.79 on AMD, ~$1.89 on NVDA, ~$18.85 on AVGO. Scales proportionally
  # to symbol price so high-priced names still get room without
  # over-cushioning every trade.
  default_stop_pct: 0.010
  default_target_pct: 0.028
  trailing_stop_pct: 0.012
  trade_management_mode: adaptive_ladder
  allow_short: true
  cooldown_minutes: 8
  reentry_policy: cooldown
  # Direction-aware cooldown: a LONG exit only blocks same-direction
  # re-entries; SHORTs remain available to capture genuine reversals.
  cooldown_direction_aware: true
  # Same-level retry block: after a losing exit, same-direction re-entry
  # on the same symbol is blocked within same_level_block_atr_mult * ATR
  # of the prior fill for same_level_block_minutes minutes. A fib-pullback
  # entry (retrace to 0.5-0.786 of the swing) overrides the block.
  same_level_block_minutes: 30
  same_level_block_atr_mult: 0.3
  # Time-stop: positions held >= time_stop_minutes with |return_pct| below
  # time_stop_min_return_pct are scratched to free a slot. 0 = disabled.
  time_stop_minutes: 45
  time_stop_min_return_pct: 0.003
  # Peak-giveback floor: once max_favorable_r since entry crosses
  # peak_giveback_min_r (default 1.0), exit when current_r retraces below
  # a tiered fraction of the peak — 50% at 1R-2R, 40% at 2R-3R, 30% at 3R+.
  peak_giveback_enabled: true
  peak_giveback_min_r: 1.0

# Runtime cadence, streaming, reconciliation, and logging controls.
runtime:
  timezone: America/New_York
  loop_sleep_seconds: 2.0
  history_poll_seconds: 300
  quote_poll_seconds: 6
  quote_cache_seconds: 6
  quote_batch_size: 20
  history_lookback_minutes: 780
  use_extended_hours_history: true
  use_rth_session_indicators: true
  warmup_minutes: 150
  prewarm_before_windows_minutes: 15
  log_dir: .logs
  # Schwab CHART_EQUITY stream field indices: 0=symbol, 1=ts, 2=open,
  # 3=high, 4=low, 5=close, 6=volume, 7=seq, 8=chart_time.
  stream_fields: [0, 1, 2, 3, 4, 5, 6, 7, 8]
  stream_connect_timeout_seconds: 20
  stream_fallback_poll_seconds: 25
  stream_stale_fallback_seconds: 180
  stream_health_log_seconds: 90
  # Auto-exit: shut down cleanly when market closes and no positions are open
  auto_exit_after_session: true
  idle_sleep_seconds: 60.0
  symbol_state_prune_seconds: 1800.0
  session_reconcile_on_resume: true
  cycle_precompute_workers: 4
  max_consecutive_quote_failures: 5
  # Per-day debug archive: on session shutdown, write
  # {log_dir}/sessions/{YYYY-MM-DD}/ with bars/{SYMBOL}.csv (RTH+indicators),
  # trades.csv for the day, and manifest.json. Disable to save disk if not
  # using dashboard/post-session analysis tooling.
  export_session_archive: true
  reconcile_on_startup: true
  startup_reconcile_mode: ignore
  startup_order_lookback_days: 2
  startup_reconcile_ignore_symbols: []
  startup_reconcile_metadata_db_path: .logs/startup_reconcile_metadata.sqlite

# Execution buffers, repricing, and exit handling behavior.
execution:
  entry_limit_min_buffer: 0.03
  entry_limit_max_buffer: 0.05
  entry_limit_spread_frac: 0.1
  entry_live_fill_timeout_seconds: 2.0
  entry_live_poll_seconds: 0.25
  entry_live_reprice_attempts: 2
  entry_live_reprice_step_frac: 0.33
  extended_hours_enabled: true
  market_exit_regular_hours: false

# Candle-pattern inputs used by strategies that support them.
candles:
  bullish_patterns:
    - bullish_1c
    - bullish_2c
    - bullish_3c
  bearish_patterns:
    - bearish_1c
    - bearish_2c
    - bearish_3c

# Higher-level chart-pattern detection and entry filters.
chart_patterns:
  enabled: true
  lookback_bars: 32
  bullish_patterns:
    - bullish_double_bottom
    - bullish_inverse_head_and_shoulders
    - bullish_falling_wedge
    - bullish_broadening_bottom
    - bullish_triple_bottom
    - bullish_flag
    - bullish_pennant
    - bullish_ascending_triangle
    - bullish_symmetrical_triangle
  bearish_patterns:
    - bearish_double_top
    - bearish_head_and_shoulders
    - bearish_rising_wedge
    - bearish_broadening_top
    - bearish_triple_top
    - bearish_flag
    - bearish_pennant
    - bearish_descending_triangle
    - bearish_symmetrical_triangle

# Dashboard server, charting, and HTTPS settings.
dashboard:
  enabled: true
  host: 127.0.0.1
  port: 8765
  refresh_ms: 1500
  state_path: .logs/dashboard_state.json
  # Theme: default, dark, light, nexus (mint), solstice (amber), nebula (violet). See intraday_tv_schwab_bot/dashboard_assets/README.md for the full catalog.
  theme: default
  # HTTPS: set to true and provide cert/key paths to serve over HTTPS
  https: false
  ssl_certfile: ""
  ssl_keyfile: ""
  charting:
    compact_chart_timeframe: ltf
    compact:
      max_bars: 90
      show_volume: true
      show_moving_averages: true
      show_vwap: true
      show_support_resistance: true
      show_next_support_resistance: true
      show_full_support_resistance_ladder: false
      show_key_level_zones: true
      show_key_level_zone_labels: true
      show_bollinger_bands: false
      show_anchored_vwap: false
      show_fib_extensions: false
      show_fib_retracements: false
      show_channel: false
      show_trendlines: false
      show_htf_fair_value_gaps: false
      show_ltf_fair_value_gaps: true
      show_htf_order_blocks: false
      show_ltf_order_blocks: false
      # Divergence trendlines on price chart. RSI on by default; OBV off
      # to avoid stacking duplicate lines on close pivot pairs.
      show_rsi_divergence: true
      show_obv_divergence: false
      show_trade_markers: true
      tooltip_show_returns: true
      tooltip_show_support_resistance: true
      tooltip_show_structure: true
      tooltip_show_volatility: true
      tooltip_show_orderflow: true
      tooltip_show_patterns: true
    expanded:
      max_bars: 360
      show_volume: true
      show_moving_averages: true
      show_vwap: true
      show_support_resistance: true
      show_next_support_resistance: true
      show_full_support_resistance_ladder: true
      show_key_level_zones: true
      show_key_level_zone_labels: true
      show_bollinger_bands: true
      show_anchored_vwap: false
      show_fib_extensions: true
      show_fib_retracements: true
      show_channel: true
      show_trendlines: true
      show_htf_fair_value_gaps: true
      show_ltf_fair_value_gaps: true
      show_htf_order_blocks: false
      show_ltf_order_blocks: false
      # Divergence trendlines on price chart. RSI on by default; OBV off
      # to avoid stacking duplicate lines on close pivot pairs.
      show_rsi_divergence: true
      show_obv_divergence: false
      show_trade_markers: true
      tooltip_show_returns: true
      tooltip_show_support_resistance: true
      tooltip_show_structure: true
      tooltip_show_volatility: true
      tooltip_show_orderflow: true
      tooltip_show_patterns: true

# Support/resistance level map + structure + FVG tuning.
support_resistance:
  enabled: true
  timeframe_minutes: 15
  lookback_days: 10
  pivot_span: 2
  max_levels_per_side: 4
  atr_tolerance_mult: 0.6
  pct_tolerance: 0.003
  same_side_min_gap_atr_mult: 0.1
  same_side_min_gap_pct: 0.0015
  fallback_reference_max_drift_atr_mult: 1.0
  fallback_reference_max_drift_pct: 0.01
  proximity_atr_mult: 0.7
  breakout_atr_mult: 0.3
  breakout_buffer_pct: 0.0012
  stop_buffer_atr_mult: 0.25
  entry_min_clearance_atr: 0.72
  entry_min_clearance_pct: 0.0025
  entry_proximity_scoring_enabled: true
  entry_bias_score_weight: 0.5
  entry_favorable_proximity_bonus: 0.3
  entry_opposing_proximity_penalty: 0.3
  use_prior_day_high_low: true
  use_prior_week_high_low: true
  htf_fair_value_gaps_enabled: true
  fair_value_gap_max_per_side: 3
  fair_value_gap_min_atr_mult: 0.06
  fair_value_gap_min_pct: 0.0006
  ltf_fair_value_gaps_enabled: true
  ltf_order_blocks_enabled: false
  htf_order_blocks_enabled: false
  order_block_mode: loose
  order_block_max_per_side: 4
  order_block_min_atr_mult: 0.05
  order_block_min_pct: 0.0005
  order_block_min_thrust_atr_mult: 0.75
  order_block_pivot_span: 2
  order_block_new_high_lookback: 8
  trading_flip_confirmation_1m_bars: 2
  trading_flip_confirmation_5m_bars: 1
  flip_stop_buffer_atr_mult: 0.25
  flip_target_requires_momentum_confirm: true
  regime_weight: 0.7
  structure_enabled: true
  structure_ltf_pivot_span: 2
  structure_eq_atr_mult: 0.25
  structure_ltf_weight: 0.65
  structure_htf_weight: 0.95
  structure_event_lookback_bars: 8

# Technical indicator-derived levels and overlay settings.
technical_levels:
  enabled: true
  fib_enabled: true
  fib_lookback_bars: 120
  fib_min_impulse_atr: 1.25
  fib_near_extension_pct: 0.0055
  channel_enabled: true
  channel_lookback_bars: 120
  channel_min_touches: 3
  channel_atr_tolerance_mult: 0.35
  channel_parallel_slope_frac: 0.12
  channel_min_gap_atr_mult: 0.8
  channel_min_gap_pct: 0.0025
  channel_near_edge_pct: 0.16
  trendline_enabled: true
  trendline_lookback_bars: 120
  trendline_min_touches: 3
  trendline_atr_tolerance_mult: 0.35
  trendline_breakout_buffer_atr_mult: 0.15
  adx_enabled: true
  adx_length: 14
  adx_min_strength: 18.0
  adx_entry_bonus: 0.2
  adx_rising_bonus: 0.08
  adx_weak_penalty: 0.12
  anchored_vwap_enabled: true
  anchored_vwap_entry_bonus: 0.2
  anchored_vwap_entry_penalty: 0.18
  atr_context_enabled: true
  atr_expansion_lookback: 5
  atr_expansion_min_mult: 0.8
  atr_expansion_bonus: 0.12
  atr_stretch_penalty_mult: 2.6
  atr_stretch_penalty: 0.2
  obv_enabled: true
  obv_ema_length: 20
  obv_entry_bonus: 0.1
  obv_entry_penalty: 0.08
  divergence_enabled: true
  divergence_rsi_length: 14
  divergence_rsi_min_delta: 2.5
  divergence_obv_min_volume_frac: 0.65
  # Counter-divergence penalty trimmed (0.12 -> 0.10 RSI, 0.10 -> 0.08 OBV)
  # to compensate for the multi-pivot detector firing strictly more often
  # than the old last-2-pivot scan it replaced. Keeps the cumulative penalty
  # mass on counter-trade entries roughly where it was before the upgrade.
  divergence_counter_rsi_penalty: 0.10
  divergence_counter_obv_penalty: 0.08
  # Multi-pivot divergence detection (added with the levels_shared.find_divergence
  # refactor): walk the last N pivots and return the most recent qualifying
  # pair, gated by max-age in bars so stale divergences don'''t dominate.
  divergence_pivot_lookback: 4
  divergence_max_age_bars: 8
  divergence_min_price_move_pct: 0.0015
  # Hidden divergence (continuation pattern) — same-direction bonus.
  divergence_hidden_bonus_rsi: 0.10
  divergence_hidden_bonus_obv: 0.08
  # HTF (multi-timeframe) divergence confluence — read from HTFContext.
  htf_divergence_aligned_bonus_rsi: 0.20
  htf_divergence_counter_penalty_rsi: 0.25
  htf_divergence_hidden_bonus_rsi: 0.10
  bollinger_enabled: true
  bollinger_length: 20
  bollinger_std_mult: 2.0
  bollinger_squeeze_width_pct: 0.06
  bollinger_entry_bonus_midband: 0.16
  bollinger_entry_penalty_outer_band: 0.22
  target_use_bollinger: false
  target_use_fib: true
  target_use_channel: true
  target_use_trendline: true
  stop_use_trendline: true
  entry_bonus_channel_alignment: 0.2
  entry_bonus_trendline_respect: 0.2
  entry_penalty_near_extension: 0.4

# Shared entry-side toggles — each is read across strategies that opt in.
shared_entry:
  use_fvg_context: true
  use_divergence_filter: true
  use_technical_entry_adjustment: true
  use_technical_stop_target_refinement: true
  use_structure_filter: true
  use_sr_filter: true
  use_sr_stop_target_refinement: true
  # HTF divergence multi-timeframe confluence (alongside use_divergence_filter
  # which gates LTF counter-divergence penalties).
  use_htf_divergence_filter: true
  # Divergence as a primary entry trigger (off by default). When enabled,
  # any strategy can fire a secondary entry signal on a confirmed divergence
  # at S/R confluence. See _divergence_entry_candidate in strategy_base.py.
  use_divergence_entry_signal: false
  divergence_entry_min_age_bars: 0
  divergence_entry_require_sr_confluence: true
  divergence_entry_score_floor: 1.5
  divergence_entry_score_bump: 0.20
  use_opposing_chart_filter: true
  use_opposing_candle_filter: false

# Shared exit-side toggles — tape-confirmation thresholds and exit gates.
shared_exit:
  use_technical_exit: true
  use_trendline_break: true
  use_channel_break: true
  use_bollinger_reject: false
  use_anchored_vwap_loss: true
  use_chart_pattern_exit: false
  use_structure_exit: true
  use_sr_loss_exit: true
  # Counter-direction REGULAR divergence forming on a held position.
  # Hidden divergence is continuation context and never triggers exit.
  use_divergence_exit_signal: false
  divergence_exit_partial_frac: 0.5
  divergence_exit_min_age_bars: 1
  divergence_exit_require_in_profit: true
  confirm_with_ema9: true
  confirm_with_ema20: true
  confirm_with_vwap: true
  confirm_with_close_position: true
  bullish_close_position_max: 0.46
  bearish_close_position_min: 0.54
  bullish_close_position_loose_max: 0.38
  bearish_close_position_loose_min: 0.62
  use_candle_pattern_exit: false

