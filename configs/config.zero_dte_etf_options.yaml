  fallback_reference_max_drift_pct: 0.01
  proximity_atr_mult: 0.7
  breakout_atr_mult: 0.3
  breakout_buffer_pct: 0.0012
  stop_buffer_atr_mult: 0.25
  entry_min_clearance_atr: 0.85
  entry_min_clearance_pct: 0.0038
