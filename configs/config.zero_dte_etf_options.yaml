  use_structure_exit: true
  use_sr_loss_exit: true
  confirm_with_ema9: true
  confirm_with_ema20: true
  confirm_with_vwap: true
  confirm_with_close_position: true
  bullish_close_position_max: 0.46
  bearish_close_position_min: 0.54
  bullish_close_position_loose_max: 0.38
  bearish_close_position_loose_min: 0.62

# Options-mode filters, pricing, and contract-selection controls.
  use_candle_pattern_exit: false
options:
  enabled: true
  underlyings:
    - SPY
    - QQQ
  confirmation_symbols:
    SPY: "$SPX"
    QQQ: "$COMPX"
    IWM: "$RUT"
  volatility_symbol: VIX
  styles:
    - orb_debit_spread
    - trend_debit_spread
    - midday_credit_spread
  min_underlying_price: 100.0
  min_option_volume: 500
  min_open_interest: 900
  max_bid_ask_spread_pct: 0.07
  max_leg_spread_dollars: 0.05
  max_net_spread_pct: 0.16
  max_net_spread_price: 2.4
  min_net_mid_price: 0.25
  target_long_delta: 0.38
  target_short_delta: 0.23
  target_single_delta: 0.28
  max_single_option_price: 2.25
  option_limit_mode: mid
  strike_width_by_symbol:
    SPY: 2.0
    QQQ: 2.0
    IWM: 1.0
  # Option A fixed-dollar sizing: contract count floats with debit per
  # the formula qty = min(max_loss_per_trade / debit_per_contract, max_contracts_per_trade).
  # max_loss_per_trade set to ~1% of $50K starting equity. Bump proportionally
  # if equity grows. Contract cap left loose so the dollar-loss budget is the
  # binding constraint, not the count. For a $2.40 vertical that's ~2 contracts;
  # for a $0.50 vertical that's ~10 contracts.
  max_contracts_per_trade: 20
  max_loss_per_trade: 500.0
  debit_stop_frac: 0.45
  debit_target_mult: 1.45
  credit_stop_mult: 1.65
  credit_target_frac: 0.32
  single_stop_frac: 0.38
  single_target_mult: 1.5
  force_flatten_time: "15:18"
  max_vix: 22.5
  vix_spike_pct: 0.011
  vertical_limit_mode: mid
  quote_stability_checks: 3
  quote_stability_pause_ms: 500
  max_mid_drift_pct: 0.06
  max_quote_age_seconds: 4
  dry_run_replace_attempts: 2
  dry_run_step_frac: 0.25
  event_blackout_file: ./macro_events.auto.yaml
  event_blackouts: []
  option_chain_cache_seconds: 4
  option_chain_cache_max_entries: 24
  # Premium ratchet — prevent giving back all gains on winning options trades.
  options_breakeven_enabled: true
  options_breakeven_mark_mult: 1.25
  options_breakeven_stop_mult: 1.05
  options_profit_lock_enabled: true
  options_profit_lock_mark_mult: 1.40
  options_profit_lock_stop_mult: 1.15
  # Time-decay-aware stop/target scaling — narrow targets as theta accelerates.
  debit_target_time_decay_enabled: true
  debit_target_time_decay_start: "10:30"
  debit_target_time_decay_end: "14:00"
  debit_target_time_decay_min_scale: 0.70
  debit_stop_time_decay_widen_factor: 0.30
  # Time-aware delta — shift deeper ITM as session progresses.
  delta_time_shift_enabled: true
  delta_time_shift_per_hour: 0.025
  delta_time_shift_max: 0.15
  delta_time_shift_start: "10:00"
  # Trend momentum filter — require ATR expansion + volume confirmation.
  trend_momentum_filter_enabled: true
  trend_min_atr_expansion: 0.85
  trend_min_volume_ratio: 0.90
  # Credit distance gate — reject when short strike is too close to underlying.
  credit_distance_gate_enabled: true
  min_credit_distance_atr: 1.8
  # Adaptive strike width — scale with volatility (disabled until tested).
  adaptive_width_enabled: false
  adaptive_width_max_scale: 1.5

