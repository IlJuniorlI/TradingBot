    - QQQ
  confirmation_symbols:
    SPY: "$SPX"
    QQQ: "$COMPX"
    IWM: "$RUT"
  volatility_symbol: VIX
  styles:
    - orb_debit_spread
    - trend_debit_spread
    - midday_credit_spread
  min_underlying_price: 100.0
  min_option_volume: 300
  min_open_interest: 600
  max_bid_ask_spread_pct: 0.1
  max_leg_spread_dollars: 0.08
  max_net_spread_pct: 0.2
  max_net_spread_price: 2.8
  min_net_mid_price: 0.25
  target_long_delta: 0.38
  target_short_delta: 0.23
  target_single_delta: 0.28
  max_single_option_price: 2.25
  option_limit_mode: mid
  strike_width_by_symbol:
    SPY: 2.0
    QQQ: 2.0
    IWM: 1.0
  max_contracts_per_trade: 1
  max_loss_per_trade: 200.0
  debit_stop_frac: 0.45
  debit_target_mult: 1.45
  credit_stop_mult: 1.65
  credit_target_frac: 0.32
  single_stop_frac: 0.38
  single_target_mult: 1.5
  force_flatten_time: "15:18"
  max_vix: 22.5
  vix_spike_pct: 0.011
  vertical_limit_mode: mid
  quote_stability_checks: 3
  quote_stability_pause_ms: 500
  max_mid_drift_pct: 0.06
  max_quote_age_seconds: 6
  dry_run_replace_attempts: 2
  dry_run_step_frac: 0.25
  event_blackout_file: ./macro_events.auto.yaml
  event_blackouts: []
  option_chain_cache_seconds: 6
  option_chain_cache_max_entries: 24

# Strategy-specific windows and tuned parameters.
strategies:
  volatility_squeeze_breakout:
    entry_windows:
      - ["09:48", "15:38"]
    management_windows:
      - ["09:33", "15:58"]
    screener_windows:
      - ["09:33", "15:38"]
    params:
      adaptive_breakeven_rr: 0.9
      adaptive_profit_lock_rr: 1.2
      adaptive_profit_lock_stop_rr: 0.26
      adaptive_runner_trigger_rr: 1.08
      anti_chase_fvg_retest_enabled: true
      anti_chase_fvg_retest_lookback_bars: 5
      anti_chase_fvg_retest_max_gap_distance_pct: 0.0028
      anti_chase_fvg_retest_max_opposing_distance_pct: 0.0018
      anti_chase_fvg_retest_min_close_position: 0.66
      anti_chase_fvg_retest_stop_buffer_gap_frac: 0.14
      breakout_buffer_pct: 0.0008
      entry_exhaustion_filter_enabled: true
      entry_wick_close_position_guard: 0.66
      force_flatten:
        long: true
        short: true
      fvg_runner_rr_bonus: 0.16
      htf_fvg_entry_weight: 0.44
      max_change_from_open: 4.5                # 2026-05-14: tightened 7.5 → 4.5; stocks already up 5%+ rarely produce clean continuation breakouts
      max_entry_bar_range_atr: 1.42
      max_entry_ema9_extension_atr: 0.68
      max_entry_lower_wick_frac: 0.25
      max_entry_upper_wick_frac: 0.25
      max_entry_vwap_extension_atr: 0.88
      max_squeeze_range_atr: 2.2
      max_squeeze_range_pct: 0.011
      max_squeeze_width_pct: 0.05
      max_squeeze_width_ratio: 0.74
      min_atr_expansion_mult: 1.0
      min_bar_close_position: 0.63
      min_bars: 60
      min_breakout_volume_ratio: 1.12
      min_change_from_open: 0.9
      min_pressure_drift_pct: 0.0011
      min_rvol: 1.35
      ltf_fvg_entry_weight: 0.24
      opposing_fvg_entry_penalty_mult: 1.0
      prefer_bollinger_squeeze_flag: true
      require_avwap_alignment: true
      require_vwap_alignment: true
      runner_enabled: true
      squeeze_baseline_bars: 22
      squeeze_lookback_bars: 16
      # 3-tier target structure (2026-05-14). All setups that pass the
      # entry filters get at minimum target_rr (1.95). The single-tier
      # promotion to runner (2.6) fires when ANY of:
      #   * msltf BoS event in the side direction
      #   * atr_expansion_mult >= min_atr_expansion_mult + 0.12 (1.12+)
      #   * strong-quality: ATR exp >= 1.25 AND vol ratio >= 1.5 AND
      #     close_pos >= 0.78 (LONG; mirror for SHORT)
      # Premium (3.2) requires strong-quality AND BoS event AND
      # Bollinger squeeze flag — exceptionally aligned setups only.
      # Disable via tiered_targets_enabled: false (falls back to the
      # 2-tier system: standard / runner).
      target_rr: 1.95
      runner_target_rr: 2.6
      premium_target_rr: 3.2
      tiered_targets_enabled: true
      tier_atr_expansion_floor: 1.25
      tier_volume_ratio_floor: 1.5
      tier_close_position_floor: 0.78
      # Screener tuning (2026-05-14 revised same-day):
      # Initial pass set screener_max_session_range_pct to 0.018 (1.8%)
      # which was mathematically inconsistent with max_change_from_open
      # (4.5%): a stock up 2%+ from open MUST have session_range >= 2%,
      # so the 1.8% cap effectively dropped the change_from_open band
      # to 0.45-1.5% and the screener returned zero symbols. The cap
      # must exceed max_change_from_open to act as a "no-excess-noise"
      # filter (clean trend kept, choppy whip rejected).
      #   * screener_min_price: 10.0 (was 8.0 hardcoded → tried 12.0
      #     → settled at 10.0). Still filters penny-stock noise.
      #   * screener_max_session_range_pct: 0.035 (3.5%). A 2.5%
      #     mover with session_range 3% is clean (kept); same mover
      #     with 5% session_range is choppy (rejected).
      #   * RVOL bonus tier: extra +2.0 for each unit of effective_rvol
      #     above 1.8, capped at +5.0 — pushes strong-accumulation
      #     names to the top of the candidate list.
      screener_min_price: 10.0
      screener_max_session_range_pct: 0.035
      screener_rvol_bonus_threshold: 1.8
      screener_rvol_bonus_scale: 2.0
      screener_rvol_bonus_cap: 5.0

# Pair definitions used by the pairs_residual strategy.
pairs: []
