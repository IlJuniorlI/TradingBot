# Top-level tuned config for volatility_squeeze_breakout.
# Shipped tuned runtime preset for this strategy.
# Put SCHWAB_APP_KEY, SCHWAB_APP_SECRET, SCHWAB_ACCOUNT_HASH, SCHWAB_ENCRYPTION_KEY, and TRADINGVIEW_SESSIONID in a .env file at the repo root (see .env.example).

# Active strategy preset to run.
strategy: volatility_squeeze_breakout

# Schwab API credentials, token storage, and account selection.
schwab:
  callback_url: https://127.0.0.1
  tokens_db: .schwabdev/tokens.db
  timeout: 10
  dry_run: true
  # Forwards to schwabdev.Client(open_browser_for_auth=...). When true (default),
  # the OAuth flow auto-opens a browser tab. Set false on headless deployments
  # (servers, CI, containers) — schwabdev will log the auth URL to open manually.
  open_browser_for_auth: true

# TradingView and screener inputs used to source candidates.
tradingview:
  market: america
  max_candidates: 6
  screener_refresh_seconds: 80
  min_market_cap: 30000000
  max_market_cap: 2000000000
  min_volume: 1800000
  min_value_traded_1m: 350000.0
  min_volume_1m: 45000

# Paper-account starting state and retained history settings.
paper:
  starting_equity: 25000.0
  max_equity_points: 2000
  max_trade_history: 200

# Position sizing, exposure caps, and trade-management defaults.
risk:
  max_positions: 2
  risk_per_trade_frac_of_notional: 0.004
  max_notional_per_trade: 4500.0
  max_total_notional: 9000.0
  max_daily_loss: 400.0
  default_stop_pct: 0.018
  default_target_pct: 0.038
  trailing_stop_pct: 0.014
  trade_management_mode: adaptive
  allow_short: false
  cooldown_minutes: 14
  reentry_policy: cooldown
  # Direction-aware cooldown: a LONG exit only blocks same-direction
  # re-entries; SHORTs remain available to capture genuine reversals.
  cooldown_direction_aware: true
  # Same-level retry block: after a losing exit, same-direction re-entry
  # on the same symbol is blocked within same_level_block_atr_mult * ATR
  # of the prior fill for same_level_block_minutes minutes. A fib-pullback
  # entry (retrace to 0.5-0.786 of the swing) overrides the block.
  same_level_block_minutes: 30
  same_level_block_atr_mult: 0.3
  # Time-stop: positions held >= time_stop_minutes with |return_pct| below
  # time_stop_min_return_pct are scratched to free a slot. 0 = disabled.
  time_stop_minutes: 45
  time_stop_min_return_pct: 0.003
  # Peak-giveback floor: once max_favorable_r since entry crosses
  # peak_giveback_min_r (default 1.0), exit when current_r retraces below
  # a tiered fraction of the peak — 50% at 1R-2R, 40% at 2R-3R, 30% at 3R+.
  peak_giveback_enabled: true
  peak_giveback_min_r: 1.0

# Runtime cadence, streaming, reconciliation, and logging controls.
runtime:
  timezone: America/New_York
  loop_sleep_seconds: 2.0
  history_poll_seconds: 300
  quote_poll_seconds: 8
  quote_cache_seconds: 8
  quote_batch_size: 20
  history_lookback_minutes: 390
  use_extended_hours_history: true
  use_rth_session_indicators: true
  warmup_minutes: 90
  prewarm_before_windows_minutes: 10
  log_dir: .logs
  stream_fields:
    - 0
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    - 7
    - 8
  stream_connect_timeout_seconds: 20
  stream_fallback_poll_seconds: 25
  stream_stale_fallback_seconds: 180
  stream_health_log_seconds: 90
  # Auto-exit: shut down cleanly when market closes and no positions are open
  auto_exit_after_session: true
  idle_sleep_seconds: 60.0
  symbol_state_prune_seconds: 1800.0
  session_reconcile_on_resume: true
  cycle_precompute_workers: 4
  max_consecutive_quote_failures: 5
  # Per-day debug archive: on session shutdown, write
  # {log_dir}/sessions/{YYYY-MM-DD}/ with bars/{SYMBOL}.csv (RTH+indicators),
  # trades.csv for the day, and manifest.json. Disable to save disk if not
  # using dashboard/post-session analysis tooling.
  export_session_archive: true
  reconcile_on_startup: true
  startup_reconcile_mode: block
  startup_order_lookback_days: 2
  startup_reconcile_ignore_symbols: []
  startup_reconcile_metadata_db_path: .logs/startup_reconcile_metadata.sqlite

# Execution buffers, repricing, and exit handling behavior.
execution:
  entry_limit_min_buffer: 0.03
  entry_limit_max_buffer: 0.05
  entry_limit_spread_frac: 0.1
  entry_live_fill_timeout_seconds: 2.0
  entry_live_poll_seconds: 0.25
  entry_live_reprice_attempts: 2
  entry_live_reprice_step_frac: 0.33
  extended_hours_enabled: true
  market_exit_regular_hours: false

# Candle-pattern inputs used by strategies that support them.
candles:
  bullish_patterns: []
  bearish_patterns: []
# Higher-level chart-pattern detection and entry filters.
chart_patterns:
  enabled: true
  lookback_bars: 32
  bullish_patterns:
    - bullish_double_bottom
    - bullish_inverse_head_and_shoulders
    - bullish_falling_wedge
    - bullish_broadening_bottom
    - bullish_triple_bottom
    - bullish_flag
    - bullish_pennant
    - bullish_ascending_triangle
    - bullish_symmetrical_triangle
  bearish_patterns:
    - bearish_double_top
    - bearish_head_and_shoulders
    - bearish_rising_wedge
    - bearish_broadening_top
    - bearish_triple_top
    - bearish_flag
    - bearish_pennant
    - bearish_descending_triangle
    - bearish_symmetrical_triangle

